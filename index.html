<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abel123 Chromebook Android App Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="card">
        <header>
            <h1>Android App Pro Builder</h1>
            <p class="subtitle">Chromebook Edition</p>
        </header>
        
        <div class="input-group">
            <label for="repo">GitHub Repository</label>
            <input type="url" id="repo" placeholder="https://github.com/gebruiker/repo" inputmode="url">
        </div>

        <div class="input-group">
            <label for="name">App Naam</label>
            <input type="text" id="name" placeholder="Mijn Geweldige App">
        </div>

        <div class="input-group">
            <label for="app-id">App ID</label>
            <input type="text" id="app-id" placeholder="com.echo.app" autocapitalize="none">
        </div>

        <div class="input-group">
            <label for="icon-input">App Icoon (Optioneel)</label>
            <input type="file" id="icon-input" accept="image/*">
            <div id="preview" style="margin-top: 15px; display: flex; justify-content: center; min-height: 20px;">
                </div>
        </div>
        
        <button id="build-btn" onclick="buildNow()">
            <span>PROJECT GENEREREN</span>
        </button>
        
        <div id="loader" class="loader"></div>
        <div id="status" class="status-container"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
